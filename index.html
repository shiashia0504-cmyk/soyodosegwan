<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소요도서관 특보 — 기자단 취재 미션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1923;--surface:#1a2535;--surface2:#222f42;--border:#2e3f55;
  --accent:#f5a623;--blue:#4a9eff;--green:#3ecf6e;--red:#e8413a;
  --gold:#f5c842;--text:#e8edf3;--muted:#8fa3bc;--deep:#a78bfa;--lit:#60a5fa;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}
#game{max-width:680px;margin:0 auto;padding:16px 14px 48px;}

/* 헤더 */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;margin-bottom:16px;background:var(--surface);border-radius:10px;border:1px solid var(--border);}
.hdr-logo{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:3px;color:var(--accent);}
.hdr-issue{font-size:11px;color:var(--muted);letter-spacing:1px;}

/* 플래시 오버레이 */
#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:999;}

/* 닉네임 */
#screen-nick{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 28px;text-align:center;}
.nick-icon{font-size:52px;margin-bottom:14px;}
.nick-title{font-family:'Black Han Sans',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;}
.nick-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.8;}
.nick-row{display:flex;gap:8px;max-width:340px;margin:0 auto 8px;}
.nick-input{flex:1;border:1.5px solid var(--border);background:var(--surface2);font-size:15px;padding:11px 14px;border-radius:8px;color:var(--text);outline:none;font-family:inherit;}
.nick-input:focus{border-color:var(--accent);}
.start-btn{background:var(--accent);color:#1a1208;border:none;border-radius:8px;font-family:'Black Han Sans',sans-serif;font-size:14px;padding:11px 18px;cursor:pointer;letter-spacing:1px;white-space:nowrap;}
.start-btn:hover{filter:brightness(1.1);}
.nick-warn{font-size:12px;color:var(--red);min-height:18px;margin-bottom:20px;}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;text-align:left;}

/* HUD */
#screen-game{display:none;}
.hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:10px;}
.hud-left{}
.hud-prog-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
.hud-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.hud-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:3px;transition:width .4s;}
.hud-center{text-align:center;}
.hud-score{font-family:'Black Han Sans',sans-serif;font-size:30px;color:var(--accent);line-height:1;}
.hud-score-label{font-size:10px;color:var(--muted);letter-spacing:1px;}
.hud-right{text-align:right;}
.hud-nick{font-size:12px;color:var(--muted);}
.hud-sec{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:1px;margin-top:2px;}

/* 콤보 */
.combo-row{display:flex;align-items:center;justify-content:center;min-height:28px;margin-bottom:6px;}
.combo-badge{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-family:'Black Han Sans',sans-serif;font-size:13px;padding:3px 16px;border-radius:20px;letter-spacing:1px;}
@keyframes comboPop{0%{transform:scale(1.35);}100%{transform:scale(1);}}
.combo-badge.pop{animation:comboPop .35s ease;}
.dot-row{display:flex;justify-content:center;gap:5px;margin-bottom:8px;min-height:14px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);transition:all .2s;}
.dot.lit{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px var(--gold);}

/* 타이머 */
.timer-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:10px;}
.timer-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.timer-fill{height:100%;border-radius:4px;transition:width .1s linear,background .3s;}
.timer-num{font-family:'Black Han Sans',sans-serif;font-size:18px;min-width:32px;text-align:right;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.blink{animation:blink .5s infinite;}

/* 카드 */
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;margin-bottom:12px;transition:border-color .25s,box-shadow .25s;}
.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.mnum{font-size:11px;color:var(--muted);letter-spacing:2px;}
.ttag{font-size:10px;padding:2px 8px;border-radius:20px;letter-spacing:1px;font-weight:700;border:1px solid;}
.ttag-상상{color:#fbbf24;border-color:#fbbf24;background:rgba(251,191,36,.1);}
.ttag-진실{color:var(--lit);border-color:var(--lit);background:rgba(96,165,250,.1);}
.ttag-리터러시{color:var(--lit);border-color:var(--lit);background:rgba(96,165,250,.1);}
.ttag-심화{color:var(--deep);border-color:var(--deep);background:rgba(167,139,250,.1);}
.ttag-종합{color:var(--muted);border-color:var(--border);background:var(--surface2);}
.deep-badge{font-size:11px;color:var(--deep);background:rgba(167,139,250,.12);border:1px solid var(--deep);padding:2px 10px;border-radius:20px;letter-spacing:1px;}
.mstamp{margin-left:auto;font-size:10px;color:var(--muted);border:1px solid var(--border);padding:2px 8px;border-radius:4px;letter-spacing:1px;}
.mq{font-size:16px;font-weight:700;line-height:1.65;color:var(--text);margin-bottom:12px;}

.clue-box{margin:10px 0;border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:var(--surface2);}
.clue-lbl{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;}
.clue-item{font-size:13px;line-height:1.85;color:var(--text);border-left:2px solid var(--accent);padding-left:10px;margin-bottom:5px;}
.clue-item:last-child{margin-bottom:0;}
.clue-name{font-size:11px;color:var(--muted);margin-right:6px;}
.ctx-box{font-size:13px;color:var(--muted);line-height:1.8;margin:10px 0;padding:10px 14px;background:var(--surface2);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;white-space:pre-line;}
.mhint{font-size:12px;color:var(--gold);margin-top:10px;padding:8px 12px;background:rgba(245,200,66,.07);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;display:none;}
.mhint.show{display:block;}

/* 선택지 */
.opts{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.opt-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;font-family:inherit;transition:border-color .12s,background .12s,transform .1s;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(245,166,35,.07);transform:translateX(3px);}
.opt-btn.correct{background:rgba(62,207,110,.14);border-color:var(--green);color:var(--green);font-weight:700;}
.opt-btn.wrong{background:rgba(232,65,58,.11);border-color:var(--red);color:var(--red);text-decoration:line-through;}
.opt-btn.reveal{background:rgba(62,207,110,.14);border-color:var(--green);color:var(--green);font-weight:700;}
.opt-btn:disabled{cursor:default;transform:none;}

/* 피드백 */
.fb{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.75;display:none;}
.fb.show{display:block;}
.fb.ok{background:rgba(62,207,110,.11);border:1px solid var(--green);color:#6ee7a0;}
.fb.no{background:rgba(232,65,58,.1);border:1px solid var(--red);color:#f87171;}
.fb.timeout{background:rgba(245,200,66,.1);border:1px solid var(--gold);color:var(--gold);}

/* 점수 팝 */
.pts-pop{position:absolute;right:20px;top:16px;font-family:'Black Han Sans',sans-serif;font-size:24px;opacity:0;pointer-events:none;}
@keyframes ptsFly{0%{opacity:1;transform:translateY(0) scale(1.2);}100%{opacity:0;transform:translateY(-44px) scale(1);}}
.pts-pop.fly{animation:ptsFly .9s forwards;}

/* 버튼 */
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;align-items:center;}
.nav-btn{font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:1px;padding:10px 20px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:all .12s;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-btn.primary{background:var(--accent);color:#1a1208;border-color:var(--accent);}
.nav-btn.primary:hover{filter:brightness(1.1);}
.hint-btn{font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid rgba(245,200,66,.4);background:transparent;color:var(--gold);cursor:pointer;margin-left:auto;font-family:inherit;transition:background .12s;}
.hint-btn:hover{background:rgba(245,200,66,.07);}

/* 결과 */
#screen-result{display:none;padding:8px 0;}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:100;}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 24px 28px;margin-bottom:14px;text-align:center;}
.res-icon{font-size:60px;margin-bottom:10px;display:block;}
.res-rank{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--accent);margin-bottom:6px;letter-spacing:2px;}
.res-big{font-family:'Black Han Sans',sans-serif;font-size:68px;color:var(--text);line-height:1;margin-bottom:2px;}
.res-sub{font-size:13px;color:var(--muted);margin-bottom:12px;}
.res-msg{font-size:14px;color:var(--muted);line-height:1.7;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px;}
.stat-item{background:var(--surface2);border-radius:10px;padding:13px 8px;text-align:center;}
.stat-num{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--text);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.sec-breakdown{margin-top:12px;text-align:left;}
.sec-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.sec-row:last-child{border-bottom:none;}
.sec-name{min-width:72px;font-weight:700;}
.sec-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.sec-fill{height:100%;border-radius:3px;}
.sec-pts{font-size:12px;color:var(--muted);min-width:60px;text-align:right;}
.res-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;text-align:left;}

/* 순위표 */
.rank-table{width:100%;border-collapse:collapse;font-size:13px;}
.rank-table th{font-size:11px;letter-spacing:1px;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;}
.rank-table td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.rank-table tr:last-child td{border-bottom:none;}
.rn{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--muted);width:36px;display:inline-block;}
.rn.g1{color:#f5c842;}.rn.g2{color:#9ca3af;}.rn.g3{color:#cd7c2f;}
.rank-me{background:rgba(245,166,35,.05);}
.rs{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--accent);text-align:right;}
.rk{font-weight:700;color:var(--text);}
.rank-empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;}
.rank-loading{text-align:center;color:var(--muted);font-size:12px;padding:16px 0;letter-spacing:1px;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="flash"></div>

<div id="game">
  <div class="hdr">
    <span class="hdr-logo">소요도서관 특보</span>
    <span class="hdr-issue" id="meta-issue"></span>
  </div>

  <!-- 닉네임 화면 -->
  <div id="screen-nick">
    <div class="nick-icon">🗞️</div>
    <div class="nick-title">기자단 입장</div>
    <div class="nick-sub">닉네임을 입력하고 취재를 시작하세요!<br>같은 닉네임은 높은 점수 기록만 남아요.</div>
    <div class="nick-row">
      <input class="nick-input" id="nickInput" maxlength="10" placeholder="닉네임 (최대 10자)">
      <button class="start-btn" onclick="startGame()">입장 →</button>
    </div>
    <div class="nick-warn" id="nickWarn"></div>
    <div class="section-title">현재 순위</div>
    <div id="rank-preview"></div>
  </div>

  <!-- 게임 화면 -->
  <div id="screen-game">
    <div class="hud">
      <div class="hud-left">
        <div class="hud-prog-label" id="prog-label">미션 1 / 12</div>
        <div class="hud-track"><div class="hud-bar" id="prog-bar" style="width:0%"></div></div>
      </div>
      <div class="hud-center">
        <div class="hud-score" id="score-disp">0</div>
        <div class="hud-score-label">점</div>
      </div>
      <div class="hud-right">
        <div class="hud-nick" id="hud-nick"></div>
        <div class="hud-sec" id="hud-sec"></div>
      </div>
    </div>
    <div class="combo-row" id="combo-row" style="display:none;">
      <div class="combo-badge" id="combo-badge">🔥 3 콤보!</div>
    </div>
    <div class="dot-row" id="dot-row"></div>
    <div class="timer-wrap">
      <div class="timer-track"><div class="timer-fill" id="timer-fill" style="width:100%;background:var(--green);"></div></div>
      <span class="timer-num" id="timer-num">45</span>
    </div>
    <div class="mcard" id="mcard">
      <div class="card-top">
        <span class="mnum" id="mnum">MISSION 01</span>
        <span class="ttag" id="mthink"></span>
        <span class="deep-badge" id="mdeep" style="display:none;">🔬 심화</span>
        <span class="mstamp" id="mstamp"></span>
      </div>
      <div class="mq" id="mq"></div>
      <div id="mctx"></div>
      <div class="mhint" id="mhint"></div>
      <div class="opts" id="mopts"></div>
      <div class="fb" id="mfb"></div>
      <div class="pts-pop" id="ptsPop"></div>
      <div class="btn-row">
        <button class="hint-btn" id="hintBtn" onclick="useHint()">💡 힌트 (점수 절반)</button>
        <button class="nav-btn primary" id="nextBtn" style="display:none" onclick="nextQ()">다음 미션 →</button>
      </div>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="screen-result">
    <div class="result-card">
      <span class="res-icon" id="res-icon">🏆</span>
      <div class="res-rank" id="res-rank"></div>
      <div class="res-big" id="res-score"></div>
      <div class="res-sub" id="res-sub"></div>
      <div class="res-msg" id="res-msg"></div>
      <div class="stat-grid" id="stat-grid"></div>
      <div class="sec-breakdown" id="sec-breakdown"></div>
    </div>
    <div class="section-title">전체 순위</div>
    <div class="res-box" id="rank-final"></div>
    <div class="btn-row" style="justify-content:center;margin-top:4px;">
      <button class="nav-btn" onclick="goNick()">닉네임 변경</button>
      <button class="nav-btn primary" onclick="restart()">다시 취재하기</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

   ★ Firebase 설정 — 아래 값을 본인 프로젝트 값으로 교체하세요 ★
================================================================ */
const firebaseConfig = {

/* ================================================================
   ★ 다음 호 교체 구역 ★
   ISSUE_KEY 바꾸면 순위 자동 리셋  /  time: 일반 45 · 심화 90
================================================================ */
const ISSUE     = "제 2 호";
const ISSUE_KEY = "v2호";

const QS = [
  {sec:"상상",stamp:"역추론",think:"🔍 역추론",time:45,
   q:"제2호 독자 댓글들을 단서로 제1호 상상제보 제목을 추리하세요!",
   ctx:{type:"clues",label:"▪ 단서 — 제1호 독자 댓글",items:[
     {name:"학생 A",text:"사회책이 탈주했다! 어젯밤 라면 냄새가 나서 일어났는데 사회책이!"},
     {name:"학생 B",text:"가방에서 탈출해서 놀이공원에서 논다"},

     {name:"학생 D",text:"매일매일 도서관에서 빌린 책이 사라져요!"},
     {name:"학생 E",text:"가방에 있는 책이 말을 하기 시작했어요!"}
   ]},
   opts:["도서관에 유령이 나타났다?","교과서들이 밤마다 가방을 탈출한다?","책들이 서로 싸우기 시작했다?","도서관 책이 스스로 날아다닌다?"],
   ans:1,
   ok:"날카로운 추리! '탈주', '탈출', '사라짐' — 모두 책이 가방을 빠져나간다는 공통 상상이에요.",
   no:"댓글마다 반복되는 단어를 찾아보세요. 책들이 어디로 가고 있나요?",
   hint:"'탈주', '탈출', '사라짐' — 책들이 어디를 벗어나고 있나요?"},

  {sec:"상상",stamp:"연결",think:"🔗 연결",time:45,
   q:"두 호의 상상제보에 공통으로 쓰인 표현 방법은 무엇일까요?",
   ctx:{type:"plain",text:"제1호: 교과서들이 밤마다 가방을 탈출한다?\n제2호: 도서관에 강아지 선생님이 나타났다?!"},
   opts:["실제 사건을 사진과 함께 보도했다","사물·동물을 사람처럼 표현하는 의인화를 사용했다","역사적 사실을 근거로 주장을 뒷받침했다","전문가 인터뷰로 신뢰성을 높였다"],
   ans:1,
   ok:"훌륭해요! 교과서가 탈출하고 강아지가 선생님이 되는 것, 모두 의인화예요!",
   no:"교과서가 '탈출'하고 강아지가 '선생님'이 돼요. 이런 표현 방법을 뭐라고 할까요?",
   hint:"사람만 할 수 있는 행동을 사물·동물이 하고 있어요."},

/* ═══ 폭죽 ═══ */
function fireConfetti(){
  const cv=document.getElementById('confetti-canvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const cols=['#f5c842','#f5a623','#4a9eff','#3ecf6e','#a78bfa','#e8413a','#60a5fa','#f472b6'];
  const pp=Array.from({length:190},()=>({
    x:Math.random()*cv.width, y:-10-Math.random()*120,
    vx:(Math.random()-.5)*7, vy:2.5+Math.random()*5,
    r:3.5+Math.random()*6, color:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*360, rv:(Math.random()-.5)*9, life:1
  }));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);let alive=false;
    pp.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.rot+=p.rv;p.life-=0.0075;
      if(p.life>0&&p.y<cv.height+20)alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.7);ctx.restore();
    });
    if(alive)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(draw);
}

/* ═══ Firebase ═══ */
async function getRanks(){try{const s=await get(ref(db,DB_PATH));return s.exists()?Object.values(s.val()).sort((a,b)=>b.score-a.score):[];}catch{return[];}}
async function saveRank(n,sc){
  try{const s=await get(ref(db,`${DB_PATH}/${n}`));if(sc>(s.exists()?s.val().score:-1))await set(ref(db,`${DB_PATH}/${n}`),{nick:n,score:sc});}catch{}
  return getRanks();
}
onValue(ref(db,DB_PATH),snap=>{
  const data=snap.exists()?Object.values(snap.val()).sort((a,b)=>b.score-a.score):[];
  document.getElementById('rank-preview').innerHTML=buildTable(data,'');
});

function buildTable(ranks,me){
  if(!ranks.length)return'<div class="rank-empty">아직 기록이 없어요. 첫 기자가 되어 보세요!</div>';
  let h='<table class="rank-table"><thead><tr><th>순위</th><th>닉네임</th><th style="text-align:right">점수</th></tr></thead><tbody>';
  ranks.slice(0,10).forEach((r,i)=>{const m=r.nick===me;h+=`<tr class="${m?'rank-me':''}"><td>${rnLbl(i)}</td><td class="rk">${r.nick}${m?' ★':''}</td><td class="rs">${r.score}</td></tr>`;});
  return h+'</tbody></table>';
}

/* ═══ 닉네임 입장 ═══ */
document.getElementById('nickInput').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});
window.startGame=()=>{
  const v=document.getElementById('nickInput').value.trim();
  if(!v){document.getElementById('nickWarn').textContent='닉네임을 입력해 주세요!';return;}
  nick=v;document.getElementById('nickWarn').textContent='';
  document.getElementById('screen-nick').style.display='none';
  document.getElementById('screen-game').style.display='block';
  document.getElementById('hud-nick').textContent=nick;
  cur=0;score=0;combo=0;maxCombo=0;hintUsed=[];answered=[];results=[];
  renderDots();render();
};

/* ═══ 타이머 ═══ */
function startTimer(sec){
  clearInterval(timerInterval);timeLeft=sec;qStart=Date.now();updTimer(sec,sec);
  timerInterval=setInterval(()=>{
    timeLeft=Math.max(0,sec-Math.floor((Date.now()-qStart)/1000));
    updTimer(timeLeft,sec);if(timeLeft<=0){clearInterval(timerInterval);onTimeout();}
  },100);
}
function stopTimer(){clearInterval(timerInterval);}
function updTimer(left,total){
  const pct=left/total*100;
  const fill=document.getElementById('timer-fill');
  fill.style.width=pct+'%';
  fill.style.background=pct>60?'var(--green)':pct>30?'var(--accent)':'var(--red)';
  const tn=document.getElementById('timer-num');
  tn.textContent=left;tn.style.color=left<=10?'var(--red)':'var(--text)';
  tn.className='timer-num'+(left<=10?' blink':'');
}
function onTimeout(){
  sfxTimeout();
  const q=QS[cur];answered[cur]=-1;combo=0;renderDots();
  results[cur]={ok:false,pts:0,sec:q.sec,timeout:true};
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ca=Array.isArray(q.ans)?q.ans:[q.ans];
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{if(ca.includes(i))b.className='opt-btn reveal';});
  const fb=document.getElementById('mfb');
  fb.className='fb show timeout';
  fb.textContent=`⏰ 시간 초과! 정답: ${q.opts[ca[0]]} — ${q.ok}`;
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('hintBtn').style.display='none';
}

/* ═══ 문제 렌더 ═══ */
function render(){
  const q=QS[cur];
  document.getElementById('prog-label').textContent=`미션 ${cur+1} / ${TOTAL}`;
  document.getElementById('prog-bar').style.width=`${cur/TOTAL*100}%`;
  document.getElementById('score-disp').textContent=score;
  document.getElementById('hud-sec').textContent=secLabel[q.sec];
  document.getElementById('mnum').textContent=`MISSION ${String(cur+1).padStart(2,'0')}`;
  document.getElementById('mstamp').textContent=q.stamp;
  const tt=document.getElementById('mthink');tt.textContent=q.think;tt.className=`ttag ttag-${q.sec}`;
  document.getElementById('mdeep').style.display=q.deep?'inline-block':'none';
  document.getElementById('mq').textContent=q.q;
  // 문맥
  const ctxW=document.getElementById('mctx');ctxW.innerHTML='';
  if(q.ctx){
    if(q.ctx.type==='clues'){
      const box=document.createElement('div');box.className='clue-box';
      const lbl=document.createElement('div');lbl.className='clue-lbl';lbl.textContent=q.ctx.label;box.appendChild(lbl);
      q.ctx.items.forEach(item=>{const d=document.createElement('div');d.className='clue-item';d.innerHTML=`<span class="clue-name">${item.name}</span>${item.text}`;box.appendChild(d);});
      ctxW.appendChild(box);
    }else{const d=document.createElement('div');d.className='ctx-box';d.textContent=q.ctx.text;ctxW.appendChild(d);}
  }
  // 힌트
  const h=document.getElementById('mhint');h.textContent=`💡 힌트: ${q.hint}`;h.className='mhint'+(hintUsed[cur]?' show':'');
  document.getElementById('hintBtn').style.display=hintUsed[cur]?'none':'inline-block';
  document.getElementById('mfb').className='fb';document.getElementById('mfb').textContent='';
  document.getElementById('nextBtn').style.display='none';
  renderOpts(q);
  if(answered[cur]===undefined)startTimer(q.time);else updTimer(0,q.time);
}

function renderOpts(q){
  const wrap=document.getElementById('mopts');wrap.innerHTML='';
  const done=answered[cur]!==undefined;
  const ca=Array.isArray(q.ans)?q.ans:[q.ans];
  const labels=['①','②','③','④'];
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=`${labels[i]} ${o}`;
    if(done){btn.disabled=true;const ma=Array.isArray(answered[cur])?answered[cur]:[answered[cur]];if(ca.includes(i))btn.className='opt-btn correct';else if(ma.includes(i)&&answered[cur]!==-1)btn.className='opt-btn wrong';}
    else btn.onclick=()=>pick(i);
    wrap.appendChild(btn);
  });
}

function calcPts(lim,el,hinted){const r=el/lim;const base=r<=1/3?20:r<=2/3?15:10;return hinted?Math.round(base/2):base;}

function pick(i){
  stopTimer();
  const q=QS[cur];answered[cur]=i;
  const ca=Array.isArray(q.ans)?q.ans:[q.ans];
  const ok=ca.includes(i);
  const elapsed=Math.floor((Date.now()-qStart)/1000);
  let pts=ok?calcPts(q.time,elapsed,hintUsed[cur]??false):0;

  if(ok){
    combo++;maxCombo=Math.max(maxCombo,combo);
    const bonus=COMBO_BONUS[Math.min(combo,COMBO_BONUS.length-1)];
    if(combo>=3){
      pts+=bonus;sfxCombo();
      const cb=document.getElementById('combo-row');
      const cbg=document.getElementById('combo-badge');
      cb.style.display='flex';
      cbg.textContent=`🔥 ${combo} 콤보! +${bonus}점 보너스`;
      cbg.classList.remove('pop');void cbg.offsetWidth;cbg.classList.add('pop');
    }else{document.getElementById('combo-row').style.display='none';}
    sfxOk();flashScreen(true);
  }else{
    combo=0;document.getElementById('combo-row').style.display='none';
    sfxNo();flashScreen(false);
  }

  score+=pts;results[cur]={ok,pts,sec:q.sec};renderDots();

  if(ok&&pts>0){
    const pop=document.getElementById('ptsPop');
    pop.textContent=`+${pts}`;
    pop.style.color=pts>=20?'var(--gold)':pts>=15?'var(--green)':'var(--accent)';
    pop.className='pts-pop';void pop.offsetWidth;pop.className='pts-pop fly';
  }

  const fb=document.getElementById('mfb');
  fb.className='fb show '+(ok?'ok':'no');
  fb.textContent=(ok?`✔ 정답! +${pts}점 (${elapsed}초) — `:'✘ 다시 생각해봐요 — ')+(ok?q.ok:q.no);
  document.getElementById('score-disp').textContent=score;
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('hintBtn').style.display='none';
  renderOpts(q);
}

window.useHint=()=>{hintUsed[cur]=true;document.getElementById('mhint').className='mhint show';document.getElementById('hintBtn').style.display='none';};
window.nextQ=()=>{cur++;if(cur>=TOTAL)showResult();else render();};

/* ═══ 결과 ═══ */
async function showResult(){
  stopTimer();
  document.getElementById('screen-game').style.display='none';
  document.getElementById('screen-result').style.display='block';

  const pct=score/MAX_SCORE;
  const rd=RANKS.find(r=>pct>=r.min);
  document.getElementById('res-icon').textContent=rd.icon;
  document.getElementById('res-rank').textContent=rd.rank;
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-sub').textContent=`/ ${MAX_SCORE}점`;
  document.getElementById('res-msg').textContent=rd.msg;
  if(rd.confetti)fireConfetti();

  const correct=results.filter(r=>r&&r.ok).length;
  const timeouts=results.filter(r=>r&&r.timeout).length;
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-item"><div class="stat-num">${correct}</div><div class="stat-lbl">정답</div></div>
    <div class="stat-item"><div class="stat-num">${maxCombo}</div><div class="stat-lbl">최고콤보</div></div>
    <div class="stat-item"><div class="stat-num">${timeouts}</div><div class="stat-lbl">시간초과</div></div>
  `;

  const byS={};
  results.forEach(r=>{if(!r)return;if(!byS[r.sec])byS[r.sec]={ok:0,total:0,pts:0};byS[r.sec].total++;byS[r.sec].pts+=r.pts;if(r.ok)byS[r.sec].ok++;});
  let secHtml='';
  ['상상','진실','리터러시','심화','종합'].forEach(s=>{
    if(!byS[s])return;const{ok,total,pts}=byS[s];const p=Math.round(ok/total*100);
    secHtml+=`<div class="sec-row"><span class="sec-name" style="color:${secColor[s]}">${secLabel[s]}</span><div class="sec-track"><div class="sec-fill" style="width:${p}%;background:${secColor[s]}"></div></div><span class="sec-pts">${ok}/${total} · ${pts}pt</span></div>`;
  });
  document.getElementById('sec-breakdown').innerHTML=secHtml;

  document.getElementById('rank-final').innerHTML='<div class="rank-loading">순위 업데이트 중…</div>';
  const ranks=await saveRank(nick,score);
  document.getElementById('rank-final').innerHTML=buildTable(ranks,nick);
}

window.goNick=()=>{document.getElementById('screen-result').style.display='none';document.getElementById('screen-nick').style.display='block';};
window.restart=()=>{
  document.getElementById('screen-result').style.display='none';document.getElementById('screen-game').style.display='block';
  document.getElementById('hud-nick').textContent=nick;
  cur=0;score=0;combo=0;maxCombo=0;hintUsed=[];answered=[];results=[];
  renderDots();render();
};
</script>
</body>
